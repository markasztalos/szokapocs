<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szókapocs - Játék Beállítása</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            <span>Szókapocs</span>
        </div>

        <div id="raffle-display" class="raffle-display" hidden>
            <span id="raffle-cell-name" class="raffle-cell-name"></span>
            <span id="raffle-countdown" class="raffle-countdown"></span>
        </div>

        <div id="raffle-controls" class="raffle-controls" hidden>
            <button id="draw-btn" class="secondary-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                Sorolás
            </button>
            <div id="raffle-post-draw-controls" class="raffle-post-draw-controls" hidden>
                <button id="retry-btn" class="secondary-btn">Mutasd újra</button>
                <button id="pass-btn" class="secondary-btn">Pasz</button>
            </div>
        </div>

        <div id="font-size-controls" class="font-size-controls" hidden>
            <button id="font-decrease-btn" class="font-size-btn" title="Kisebb betű">−</button>
            <button id="font-increase-btn" class="font-size-btn" title="Nagyobb betű">+</button>
            <div id="game-timer" class="timer-display">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span id="timer-text">00:00</span>
            </div>
        </div>
    </header>

    <main class="setup-container" id="setup-view">
        <div class="content-box">
            <div class="box-header">
                <div class="section-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                    <span>Szókészlet</span>
                </div>
                <button id="regenerate-btn" class="secondary-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                    Újragenerálás
                </button>
            </div>

            <div class="word-list" id="word-inputs">
                <!-- Inputs will be generated by JS -->
            </div>
        </div>

        <div class="actions">
            <button id="start-game-btn" class="primary-btn">
                Játék Indítása
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
        </div>
    </main>

    <main class="game-container" id="game-view" hidden>
        <div class="game-grid-wrapper">
            <div id="main-grid" class="game-grid">
                <!-- Grid items will be generated by JS -->
            </div>
        </div>
    </main>

    <script src="words.js"></script>
    <script src="main.js?v=2"></script>
</body>
</html>
